<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px; max-height: 600px; overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      font-size: 12px; background: #0d1117; color: #c9d1d9;
    }

    /* Header */
    .header {
      padding: 12px 14px; background: #161b22;
      border-bottom: 1px solid #21262d;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #f0f6fc; }
    .header .version { font-size: 10px; color: #484f58; margin-left: 6px; }

    /* Stats bar */
    .stats {
      display: flex; gap: 12px; padding: 8px 14px;
      background: #161b22; border-bottom: 1px solid #21262d;
      font-size: 11px; color: #8b949e;
    }
    .stat-value { color: #58a6ff; font-weight: 600; }
    .stat-blocked .stat-value { color: #f85149; }

    /* Controls */
    .controls {
      display: flex; gap: 6px; padding: 10px 14px;
      border-bottom: 1px solid #21262d;
    }
    button {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      font-size: 11px; font-family: inherit; transition: background 0.15s;
    }
    button:hover { background: #30363d; border-color: #484f58; }
    button.primary { background: #238636; border-color: #2ea043; color: #fff; }
    button.primary:hover { background: #2ea043; }
    button.danger { background: #da3633; border-color: #f85149; color: #fff; }
    button.danger:hover { background: #f85149; }

    /* Settings */
    .settings {
      padding: 10px 14px; border-bottom: 1px solid #21262d;
    }
    .settings-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px;
    }
    .settings label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #8b949e; cursor: pointer;
    }
    .settings label:hover { color: #c9d1d9; }
    .settings input[type="checkbox"] { accent-color: #58a6ff; }
    .interval-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; font-size: 11px; color: #8b949e;
    }
    .interval-row input[type="number"] {
      width: 55px; background: #0d1117; color: #c9d1d9;
      border: 1px solid #30363d; border-radius: 4px;
      padding: 3px 6px; font-size: 11px; font-family: inherit;
    }

    /* Content / story list */
    #content { padding: 10px 14px; min-height: 60px; }
    .empty { color: #484f58; font-style: italic; font-size: 11px; }

    .user {
      margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid #21262d;
    }
    .user:last-child { border-bottom: none; margin-bottom: 0; }
    .user-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .username { font-weight: 600; color: #58a6ff; font-size: 12px; }
    .story-count {
      font-size: 10px; color: #484f58; background: #21262d;
      padding: 1px 6px; border-radius: 10px;
    }

    .item {
      display: flex; align-items: center; gap: 6px;
      margin: 3px 0 3px 8px; font-size: 11px; color: #8b949e;
      padding: 3px 0;
    }
    .item-type {
      font-size: 10px; font-weight: 600; padding: 1px 5px;
      border-radius: 3px; text-transform: uppercase;
    }
    .item-type.video { background: #1f3a2d; color: #3fb950; }
    .item-type.image { background: #1c2d4a; color: #58a6ff; }
    .deleted { color: #f85149; font-weight: 600; font-size: 10px; }
    .music { color: #d2a8ff; font-size: 10px; }
    .caption-text { color: #8b949e; font-size: 10px; font-style: italic; }
    .media-link {
      color: #58a6ff; text-decoration: none; font-size: 10px;
      padding: 1px 4px; border: 1px solid #30363d; border-radius: 3px;
    }
    .media-link:hover { background: #21262d; }
    .cached { color: #484f58; font-size: 9px; margin-left: auto; white-space: nowrap; }

    /* Log section */
    .log-section {
      border-top: 1px solid #21262d; background: #0d1117;
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; cursor: pointer;
    }
    .log-header span { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; }
    .log-header button { font-size: 9px; padding: 2px 6px; }
    #log {
      max-height: 120px; overflow-y: auto; padding: 0 14px 8px;
      font-size: 10px; color: #484f58; font-family: monospace;
    }
    #log div { padding: 1px 0; border-bottom: 1px solid #161b22; }
    #log .log-error { color: #f85149; }
    #log .log-bg { color: #8b949e; }
  </style>
</head>
<body>
  <div class="header">
    <div><h1>IG Story Research<span class="version">v0.9</span></h1></div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-blocked">Blocked: <span class="stat-value" id="statBlocked">0</span></div>
    <div>Users: <span class="stat-value" id="statUsers">0</span></div>
    <div>Stories: <span class="stat-value" id="statStories">0</span></div>
  </div>

  <div class="controls">
    <button id="refresh" class="primary">Refresh</button>
    <button id="export">Export JSON</button>
    <button id="clear" class="danger">Clear</button>
  </div>

  <div class="settings">
    <div class="settings-grid">
      <label><input type="checkbox" id="blockSeen" checked> Block story seen</label>
      <label><input type="checkbox" id="blockDMRead" checked> Block DM read</label>
      <label><input type="checkbox" id="blockTyping" checked> Block typing</label>
      <label><input type="checkbox" id="autoFetch" checked> Auto-fetch</label>
      <label><input type="checkbox" id="autoDownload" checked> Auto-download</label>
    </div>
    <div class="interval-row">
      Fetch every <input type="number" id="interval" value="300" min="60" max="3600"> sec
      <button id="saveSettings">Save</button>
    </div>
  </div>

  <div id="content"><span class="empty">No stories cached yet. Browse Instagram to start.</span></div>

  <div class="log-section">
    <div class="log-header">
      <span>Debug Log</span>
      <button id="clearLog">Clear</button>
    </div>
    <div id="log"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
