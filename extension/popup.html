<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px; max-height: 600px; overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px; background: #0d1117; color: #c9d1d9;
      scrollbar-width: thin; scrollbar-color: #30363d #0d1117;
    }

    /* ---- Header ---- */
    .header {
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #161b22 0%, #1c2333 100%);
      border-bottom: 1px solid #21262d;
      display: flex; align-items: center; gap: 10px;
    }
    .header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 15px; font-weight: 700; color: #f0f6fc; line-height: 1.2; }
    .header-text .subtitle { font-size: 10px; color: #484f58; margin-top: 1px; letter-spacing: 0.3px; }

    /* ---- Stats ---- */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      padding: 10px 16px; gap: 8px;
      background: #0d1117; border-bottom: 1px solid #21262d;
    }
    .stat {
      text-align: center; padding: 8px 4px;
      background: #161b22; border-radius: 8px;
      border: 1px solid #21262d;
    }
    .stat-value { font-size: 18px; font-weight: 700; line-height: 1.2; }
    .stat-label { font-size: 9px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .stat-blocked .stat-value { color: #f85149; }
    .stat-users .stat-value { color: #58a6ff; }
    .stat-stories .stat-value { color: #3fb950; }
    .stat-typing .stat-value { color: #d2a8ff; }

    /* ---- Controls ---- */
    .controls {
      display: flex; gap: 6px; padding: 10px 16px;
      border-bottom: 1px solid #21262d;
    }
    button {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 500; font-family: inherit;
      transition: all 0.15s ease; display: flex; align-items: center; gap: 5px;
    }
    button:hover { background: #30363d; border-color: #484f58; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #238636; border-color: #2ea043; color: #fff; }
    button.primary:hover { background: #2ea043; }
    button.danger { color: #f85149; border-color: #f8514966; }
    button.danger:hover { background: #f8514922; }

    /* ---- Settings ---- */
    .settings {
      padding: 12px 16px; border-bottom: 1px solid #21262d;
    }
    .settings-title {
      font-size: 10px; font-weight: 600; color: #484f58;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .toggle-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .toggle-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px;
      background: #161b22; border: 1px solid #21262d;
      cursor: pointer; transition: all 0.15s;
    }
    .toggle-item:hover { border-color: #30363d; background: #1c2333; }
    .toggle-item input[type="checkbox"] { display: none; }
    .toggle-switch {
      width: 32px; height: 18px; border-radius: 9px;
      background: #30363d; position: relative;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-switch::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #8b949e; transition: all 0.2s;
    }
    .toggle-item input:checked + .toggle-switch { background: #238636; }
    .toggle-item input:checked + .toggle-switch::after { left: 16px; background: #fff; }
    .toggle-item .toggle-icon { font-size: 14px; }
    .toggle-item .toggle-label { font-size: 11px; color: #8b949e; line-height: 1.2; }
    .toggle-item input:checked ~ .toggle-label { color: #c9d1d9; }

    .interval-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #21262d;
    }
    .interval-row span { font-size: 11px; color: #8b949e; }
    .interval-row input[type="number"] {
      width: 60px; background: #0d1117; color: #c9d1d9;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 5px 8px; font-size: 12px; font-family: inherit;
      text-align: center;
    }
    .interval-row input:focus { outline: none; border-color: #58a6ff; }

    /* ---- Content / story list ---- */
    #content { padding: 12px 16px; min-height: 60px; }
    .empty {
      text-align: center; padding: 20px 0; color: #484f58;
    }
    .empty-icon { font-size: 28px; margin-bottom: 6px; }
    .empty-text { font-size: 12px; font-style: italic; }

    .user {
      margin-bottom: 12px; padding-bottom: 12px;
      border-bottom: 1px solid #21262d;
    }
    .user:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .user-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .username {
      font-weight: 600; color: #58a6ff; font-size: 13px;
      text-decoration: none;
    }
    .username:hover { text-decoration: underline; }
    .story-count {
      font-size: 10px; color: #8b949e; background: #21262d;
      padding: 2px 8px; border-radius: 10px; font-weight: 500;
    }

    .item {
      display: flex; align-items: center; gap: 6px;
      margin: 4px 0; font-size: 11px; color: #8b949e;
      padding: 5px 8px; border-radius: 6px;
      background: #161b22; border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .item:hover { border-color: #21262d; }
    .item-type {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .item-type.video { background: #1f3a2d; color: #3fb950; }
    .item-type.image { background: #1c2d4a; color: #58a6ff; }
    .item-time { color: #8b949e; font-size: 11px; }
    .deleted {
      color: #f85149; font-weight: 700; font-size: 9px;
      background: #f8514922; padding: 1px 5px; border-radius: 3px;
    }
    .music { color: #d2a8ff; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .caption-text { color: #8b949e; font-size: 10px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
    .media-link {
      color: #58a6ff; text-decoration: none; font-size: 10px; font-weight: 500;
      padding: 2px 6px; border: 1px solid #30363d; border-radius: 4px;
      transition: all 0.15s;
    }
    .media-link:hover { background: #58a6ff22; border-color: #58a6ff66; }
    .cached { color: #484f58; font-size: 9px; margin-left: auto; white-space: nowrap; }

    /* ---- Log ---- */
    .log-section {
      border-top: 1px solid #21262d; background: #010409;
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; cursor: pointer; user-select: none;
    }
    .log-header span {
      font-size: 10px; color: #484f58; text-transform: uppercase;
      letter-spacing: 0.8px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .log-header button { font-size: 10px; padding: 3px 8px; }
    #log {
      max-height: 120px; overflow-y: auto; padding: 0 16px 10px;
      font-size: 10px; color: #484f58; font-family: "SF Mono", "Fira Code", monospace;
      scrollbar-width: thin; scrollbar-color: #21262d #010409;
    }
    #log div { padding: 2px 0; border-bottom: 1px solid #0d1117; line-height: 1.4; }
    #log .log-error { color: #f85149; }
    #log .log-bg { color: #8b949e; }
    #log .log-page { color: #d2a8ff; }

    /* ---- Animations ---- */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fetching { animation: pulse 1s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">&#128065;</div>
    <div class="header-text">
      <h1>IG Ghost Mode</h1>
      <div class="subtitle">the PoC that became a product - you're welcome Meta</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat stat-blocked">
      <div class="stat-value" id="statBlocked">0</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat stat-users">
      <div class="stat-value" id="statUsers">0</div>
      <div class="stat-label">Users</div>
    </div>
    <div class="stat stat-stories">
      <div class="stat-value" id="statStories">0</div>
      <div class="stat-label">Stories</div>
    </div>
    <div class="stat stat-typing">
      <div class="stat-value" id="statTyping">0</div>
      <div class="stat-label">Typing</div>
    </div>
  </div>

  <div class="controls">
    <button id="refresh" class="primary">&#8635; Refresh</button>
    <button id="export">&#8681; Export</button>
    <button id="clear" class="danger">&#10005; Clear</button>
  </div>

  <div class="settings">
    <div class="settings-title">Privacy Controls</div>
    <div class="toggle-grid">
      <label class="toggle-item">
        <input type="checkbox" id="blockSeen" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#128065;</span>
        <span class="toggle-label">Story seen</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="blockDMRead" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#9993;</span>
        <span class="toggle-label">DM read</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="blockTyping" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#9000;</span>
        <span class="toggle-label">Typing</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="autoDownload" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#128190;</span>
        <span class="toggle-label">Download</span>
      </label>
    </div>
    <div class="interval-row">
      <span>&#8634; Auto-fetch every</span>
      <input type="number" id="interval" value="300" min="60" max="3600">
      <span>sec</span>
      <label class="toggle-item" style="margin-left:auto;padding:4px 8px;">
        <input type="checkbox" id="autoFetch" checked>
        <div class="toggle-switch"></div>
      </label>
      <button id="saveSettings" style="margin-left:4px;">Save</button>
    </div>
  </div>

  <div id="content">
    <div class="empty">
      <div class="empty-icon">&#128270;</div>
      <div class="empty-text">No stories cached yet. Browse Instagram to start.</div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>&#9881; Debug Log</span>
      <button id="clearLog">Clear</button>
    </div>
    <div id="log"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
