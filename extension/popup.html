<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ---- Dark theme (default) ---- */
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #c9d1d9;
      --text-muted: #484f58;
      --accent-blue: #58a6ff;
      --accent-green: #238636;
      --accent-green-hover: #2ea043;
      --accent-red: #f85149;
      --accent-purple: #d2a8ff;
      --toggle-bg: #30363d;
      --toggle-dot: #8b949e;
    }

    /* ---- Light theme ---- */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f6f8fa;
        --bg-tertiary: #e1e4e8;
        --border: #d0d7de;
        --text-primary: #1f2328;
        --text-secondary: #424a53;
        --text-muted: #6e7781;
        --accent-blue: #0969da;
        --accent-green: #1a7f37;
        --accent-green-hover: #218c3a;
        --accent-red: #cf222e;
        --accent-purple: #8250df;
        --toggle-bg: #d0d7de;
        --toggle-dot: #6e7781;
      }
    }

    body {
      width: 380px; overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px; background: var(--bg-primary); color: var(--text-secondary);
      scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) var(--bg-primary);
    }

    /* ---- Header ---- */
    .header {
      padding: 14px 16px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
    .header-text .subtitle { font-size: 10px; color: var(--text-muted); margin-top: 1px; letter-spacing: 0.3px; }

    /* ---- Stats ---- */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      padding: 10px 16px; gap: 8px;
      background: var(--bg-primary); border-bottom: 1px solid var(--border);
    }
    .stat {
      text-align: center; padding: 8px 4px;
      background: var(--bg-secondary); border-radius: 8px;
      border: 1px solid var(--border);
    }
    .stat-value { font-size: 18px; font-weight: 700; line-height: 1.2; }
    .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .stat-blocked .stat-value { color: var(--accent-red); }
    .stat-users .stat-value { color: var(--accent-blue); }
    .stat-stories .stat-value { color: var(--accent-green); }
    .stat-typing .stat-value { color: var(--accent-purple); }

    /* ---- Controls ---- */
    .controls {
      display: flex; gap: 6px; padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    button {
      background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border);
      padding: 7px 12px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 500; font-family: inherit;
      transition: all 0.15s ease; display: flex; align-items: center; gap: 5px;
      flex: 1; justify-content: center;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: var(--accent-green); border-color: var(--accent-green-hover); color: #fff; }
    button.accent { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
    button.danger { color: var(--accent-red); border-color: color-mix(in srgb, var(--accent-red) 40%, transparent); }

    /* ---- Settings ---- */
    .settings {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .settings-title {
      font-size: 10px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .toggle-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
    }
    .toggle-item:hover { border-color: var(--text-muted); }
    .toggle-item input[type="checkbox"] { display: none; }
    .toggle-switch {
      width: 32px; height: 18px; border-radius: 9px;
      background: var(--toggle-bg); position: relative;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-switch::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--toggle-dot); transition: all 0.2s;
    }
    .toggle-item input:checked + .toggle-switch { background: var(--accent-green); }
    .toggle-item input:checked + .toggle-switch::after { left: 16px; background: #fff; }
    .toggle-item .toggle-icon { font-size: 14px; }
    .toggle-item .toggle-label { font-size: 11px; color: var(--text-muted); line-height: 1.2; }
    .toggle-item input:checked ~ .toggle-label { color: var(--text-secondary); }

    .interval-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .interval-row span { font-size: 11px; color: var(--text-muted); }
    .interval-row input[type="number"] {
      width: 60px; background: var(--bg-primary); color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 12px; font-family: inherit; text-align: center;
    }
    .interval-row input:focus { outline: none; border-color: var(--accent-blue); }

    /* ---- Log ---- */
    .log-section { border-top: 1px solid var(--border); }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; cursor: pointer; user-select: none;
    }
    .log-header span {
      font-size: 10px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.8px; font-weight: 600;
    }
    .log-header button { font-size: 10px; padding: 3px 8px; flex: none; }
    #log {
      max-height: 120px; overflow-y: auto; padding: 0 16px 10px;
      font-size: 10px; color: var(--text-muted); font-family: "SF Mono", "Fira Code", monospace;
    }
    #log div { padding: 2px 0; border-bottom: 1px solid var(--bg-secondary); line-height: 1.4; }
    #log .log-error { color: var(--accent-red); }
    #log .log-bg { color: var(--text-muted); }
    #log .log-page { color: var(--accent-purple); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fetching { animation: pulse 1s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">&#128065;</div>
    <div class="header-text">
      <h1>IG Ghost Mode</h1>
      <div class="subtitle">the PoC that became a product - you're welcome Meta</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat stat-blocked">
      <div class="stat-value" id="statBlocked">0</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat stat-users">
      <div class="stat-value" id="statUsers">0</div>
      <div class="stat-label">Users</div>
    </div>
    <div class="stat stat-stories">
      <div class="stat-value" id="statStories">0</div>
      <div class="stat-label">Stories</div>
    </div>
    <div class="stat stat-typing">
      <div class="stat-value" id="statTyping">0</div>
      <div class="stat-label">Typing</div>
    </div>
  </div>

  <div class="controls">
    <button id="refresh" class="primary">&#8635; Refresh</button>
    <button id="viewStories" class="accent">&#9776; Stories</button>
    <button id="export">&#8681; Export</button>
    <button id="clear" class="danger">&#10005;</button>
  </div>

  <div class="settings">
    <div class="settings-title">Privacy Controls</div>
    <div class="toggle-grid">
      <label class="toggle-item">
        <input type="checkbox" id="blockSeen" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#128065;</span>
        <span class="toggle-label">Story seen</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="blockDMRead" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#9993;</span>
        <span class="toggle-label">DM read</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="blockTyping" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#9000;</span>
        <span class="toggle-label">Typing</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="blockPresence">
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#128994;</span>
        <span class="toggle-label">Online</span>
      </label>
      <label class="toggle-item">
        <input type="checkbox" id="autoDownload" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-icon">&#128190;</span>
        <span class="toggle-label">Download</span>
      </label>
    </div>
    <div class="interval-row">
      <span>&#8634; Fetch every</span>
      <input type="number" id="interval" value="300" min="60" max="3600">
      <span>sec</span>
      <label class="toggle-item" style="margin-left:auto;padding:4px 8px;flex:none;">
        <input type="checkbox" id="autoFetch" checked>
        <div class="toggle-switch"></div>
      </label>
      <button id="saveSettings" style="flex:none;">Save</button>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>&#9881; Debug Log</span>
      <button id="clearLog">Clear</button>
    </div>
    <div id="log"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
